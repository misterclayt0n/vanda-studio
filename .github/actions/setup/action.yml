name: Setup workspace
description: Install the repository's pinned Node and pnpm toolchain

runs:
  using: composite
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 11.7.0

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24.13.0
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
